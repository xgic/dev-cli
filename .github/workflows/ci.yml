name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test (Python 3.14)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install core + package
        run: |
          python -m pip install --upgrade pip
          # Core thin package (public GitHub); pin branch until 0.2.0 is on main
          pip install "git+https://github.com/xgic/cli.git@2-extract-shared-core"
          pip install -e ".[dev]"

      - name: Ruff
        run: ruff check src tests

      - name: Pytest
        run: pytest -q
